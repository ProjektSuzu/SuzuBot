name: .NET

on:
  push:
    branches: [ master ]
    tags: '[0-9].[0-9]+.[0-9]+-[0-9a-zA-Z]*'
    
jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.token }}
        submodules: 'true'
#    - name: Setup .NET
#      uses: actions/setup-dotnet@v2
#      with:
#        dotnet-version: 7.0.x
    - name: Setup latest .NET SDKs
    # You may pin to the exact commit or the version.
    # uses: Elskom/setup-latest-dotnet@908aae4113c27b157acc40625a3495c80b29f407
      uses: Elskom/setup-latest-dotnet@v1.1.2
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: |
        dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Publish
      run:  dotnet publish -c Release --no-self-contained -f net7.0 -o publish
      
#    - name: Stop current program
#      uses: garygrossgarten/github-action-ssh@v0.6.3
#      with:
#        command: |
#          sudo screen -S rin -X stuff $'\003'
#        host: ${{ secrets.host }}
#        port: ${{ secrets.port }}
#        username: ${{ secrets.username }}
#        password: ${{ secrets.password }}
        
    - name: Copy folder content recursively to remote
      uses: garygrossgarten/github-action-scp@v0.7.3
      with:
        local: publish
        remote: /home/RinBot
        host: ${{ secrets.host }}
        port: ${{ secrets.port }}
        username: ${{ secrets.username }}
        password: ${{ secrets.password }}
        
    - name: Restart systemd
      uses: garygrossgarten/github-action-ssh@v0.6.3
      with:
        command: |
          sudo systemctl restart rinbot.service
        host: ${{ secrets.host }}
        port: ${{ secrets.port }}
        username: ${{ secrets.username }}
        password: ${{ secrets.password }}
    
  
