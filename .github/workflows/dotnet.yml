name: .NET

on:
  push:
    branches: [ master ]
    tags: '[0-9].[0-9]+.[0-9]+-[0-9a-zA-Z]*'
    
jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.token }}
        submodules: 'true'
    - name: Setup .NET 7
      uses: actions/setup-dotnet@v2.1.0
      with:
        # Optional SDK version(s) to use. If not provided, will install global.json version when available. Examples: 2.2.104, 3.1, 3.1.x
        dotnet-version: '7.0.x' # optional
    - name: Setup .NET 6
      uses: actions/setup-dotnet@v2.1.0
      with:
        # Optional SDK version(s) to use. If not provided, will install global.json version when available. Examples: 2.2.104, 3.1, 3.1.x
        dotnet-version: '6.0.x' # optional
    - name: Restore dependencies
      run: dotnet restore
    - name: Publish
      run:  dotnet publish -c Release --no-self-contained -o publish
      
#    - name: Stop current program
#      uses: garygrossgarten/github-action-ssh@v0.6.3
#      with:
#        command: |
#          sudo screen -S rin -X stuff $'\003'
#        host: ${{ secrets.host }}
#        port: ${{ secrets.port }}
#        username: ${{ secrets.username }}
#        password: ${{ secrets.password }}
        
    - name: Copy folder content recursively to remote
      uses: garygrossgarten/github-action-scp@v0.7.3
      with:
        local: publish
        remote: /home/SuzuBot
        host: ${{ secrets.host }}
        port: ${{ secrets.port }}
        username: ${{ secrets.username }}
        password: ${{ secrets.password }}
        
    - name: Restart systemd
      uses: garygrossgarten/github-action-ssh@v0.6.3
      with:
        command: |
          sudo chmod 755 /home/SuzuBot/SuzuBot.dll &&
          sudo systemctl restart suzubot.service
        host: ${{ secrets.host }}
        port: ${{ secrets.port }}
        username: ${{ secrets.username }}
        password: ${{ secrets.password }}
    
  
